<!DOCTYPE html>
<html>
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<button id="vt-resume-btn">Resume</button>
<script>
var highestPercent = 20;
var getDurationFn = function() { return 54; };
var playFn = function(time) { console.log("Playing at", time); };

$(document).on('click', '#vt-resume-btn', function(e) {
    e.preventDefault();
    var $resumeBtn = $(this);
    var duration = getDurationFn();
    
    var executeResume = function(dur) {
        var resumeTime = (highestPercent / 100) * dur;
        playFn(resumeTime);
        $resumeBtn.fadeOut();
    };

    if (duration && duration > 0 && !isNaN(duration)) {
        executeResume(duration);
    }
});
</script>
</body>
</html>
